<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SuzyHikes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <site-navbar></site-navbar>

  <main class="container py-5" style="max-width: 560px;">
    <div id="msg" class="alert d-none" role="alert"></div>

    <!-- LOGIN -->
    <section id="loginSection" class="bg-white p-4 rounded shadow-sm">
      <h1 class="h3 text-center mb-3">Login</h1>

      <input id="loginEmail" type="email" class="form-control mb-3" placeholder="Email" />
      <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password" />

      <button id="loginBtn" class="btn btn-primary w-100">Login</button>

      <p class="text-center mt-3 mb-0">
        Don’t have an account? <a href="#" id="goSignup">Sign up</a>
      </p>
    </section>

    <!-- SIGNUP -->
    <section id="signupSection" class="bg-white p-4 rounded shadow-sm d-none mt-3">
      <h1 class="h3 text-center mb-3">Sign Up</h1>

      <input id="signupName" type="text" class="form-control mb-3" placeholder="First and Last Name" />
      <input id="signupEmail" type="email" class="form-control mb-3" placeholder="Email" />
      <input id="signupPassword" type="password" class="form-control mb-3" placeholder="Password" />

      <button id="signupBtn" class="btn btn-success w-100">Create Account</button>

      <p class="text-center mt-3 mb-0">
        Already have an account? <a href="#" id="goLogin">Login</a>
      </p>
    </section>

    <footer class="text-center text-muted mt-4">
      © 2026 SuzyHikes • Suzy Hham
    </footer>
  </main>

  <script type="module" src="/src/components/site-navbar.js"></script>
  <script type="module" src="/src/loginSignup.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
