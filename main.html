<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main - SuzyHikes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <site-navbar></site-navbar>

  <main class="container py-5">

    <h1 id="greetingText" class="display-5 mb-3">Loading...</h1>

    <p class="lead">Welcome to SuzyHikes main page.</p>

    <p class="mb-5">
      Quote of the day:
      <span id="quote-goes-here" class="fw-semibold"></span>
    </p>

    <!-- Popular Hikes Section -->
    <section class="mt-4">
      <h2 class="mb-4">Popular Hikes</h2>
      <div id="hikes-go-here" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </section>

  </main>

  <!-- ✅ Card Template -->
  <template id="hikeCardTemplate">
    <div class="col">
      <div class="card h-100 shadow-sm">
        <img class="card-img-top card-image" src="..." alt="Hike Image" style="height: 180px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title"></h5>
          <p class="card-text"></p>
          <p class="mb-3">Length: <span class="card-length"></span> km</p>
          <a class="btn btn-primary read-more" href="#">Read More</a>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="/src/components/site-navbar.js"></script>
  <script type="module" src="/src/main.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
